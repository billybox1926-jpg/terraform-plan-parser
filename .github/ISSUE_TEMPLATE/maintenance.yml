name: Maintenance task
description: Track repository upkeep, refactors, CI hygiene, packaging, or project-management cleanup.
title: "chore: "
labels:
  - infra
body:
  - type: markdown
    attributes:
      value: |
        Use this template for upkeep that improves project health without being primarily a bug, feature, or documentation task.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What maintenance work should be done?
      placeholder: Clean up...
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why this matters
      description: Explain the project-management, maintainability, release, CI, or contributor benefit.
      placeholder: This matters because...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area labels to consider
      description: Maintainers should apply the matching area labels after triage.
      multiple: true
      options:
        - ci
        - infra
        - output
        - advanced
        - documentation
    validations:
      required: false

  - type: textarea
    id: proposed_work
    attributes:
      label: Proposed work
      description: List the concrete changes expected.
      value: |
        - 
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true before this maintenance issue can be closed?
      value: |
        - [ ] The cleanup or maintenance task is complete.
        - [ ] Existing behavior remains unchanged unless explicitly documented.
        - [ ] Tests, docs, or workflow checks are updated if needed.
        - [ ] Follow-up work is captured in linked issues if needed.
    validations:
      required: true

  - type: textarea
    id: relationships
    attributes:
      label: Relationships
      description: List dependencies or blocked issues if relevant. Mirror these relationships in related issues.
      value: |
        ## Depends on
        - None currently.

        ## Blocks
        - None currently.
    validations:
      required: false
