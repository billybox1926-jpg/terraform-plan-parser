<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Terraform Plan Parser project visual</title>
  <desc id="desc">A dark terminal-inspired banner showing Terraform plan JSON flowing through a Rust CLI parser into clean summaries, CI guardrails, and release artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="52%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="32" fill="url(#grid)"/>
  <circle cx="1030" cy="70" r="150" fill="#38bdf8" opacity="0.10"/>
  <circle cx="170" cy="350" r="190" fill="#34d399" opacity="0.08"/>
  <path d="M110 320 C260 230 370 360 520 275 S790 180 1080 245" fill="none" stroke="url(#accent)" stroke-width="3" stroke-opacity="0.38"/>

  <g filter="url(#softShadow)">
    <rect x="76" y="72" width="1048" height="276" rx="24" fill="#020617" opacity="0.72"/>
    <rect x="76" y="72" width="1048" height="276" rx="24" fill="url(#panel)" opacity="0.88"/>
    <rect x="76" y="72" width="1048" height="48" rx="24" fill="#0f172a"/>
    <circle cx="112" cy="96" r="7" fill="#fb7185"/>
    <circle cx="136" cy="96" r="7" fill="#fbbf24"/>
    <circle cx="160" cy="96" r="7" fill="#34d399"/>
  </g>

  <text x="104" y="168" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="46" font-weight="800">Terraform Plan Parser</text>
  <text x="106" y="207" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">JSON plans in. Clean summaries out. Local review, CI guardrails, release-ready artifacts.</text>

  <g font-family="ui-monospace, SFMono-Regular, Consolas, Menlo, monospace" font-size="18">
    <rect x="106" y="242" width="234" height="70" rx="14" fill="#111827" stroke="#38bdf8" stroke-opacity="0.55"/>
    <text x="128" y="273" fill="#7dd3fc">terraform plan -json</text>
    <text x="128" y="297" fill="#94a3b8">.tfplan / state / stdin</text>

    <path d="M356 277 H438" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <path d="M428 265 L444 277 L428 289" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="462" y="226" width="276" height="104" rx="18" fill="#111827" stroke="#a78bfa" stroke-opacity="0.7"/>
    <text x="488" y="260" fill="#ddd6fe">parse • filter • compare</text>
    <text x="488" y="286" fill="#c4b5fd">--fail-on delete</text>
    <text x="488" y="312" fill="#94a3b8">stdout stays script-safe</text>

    <path d="M754 277 H836" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <path d="M826 265 L842 277 L826 289" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="858" y="242" width="232" height="70" rx="14" fill="#111827" stroke="#34d399" stroke-opacity="0.65"/>
    <text x="880" y="273" fill="#86efac">text • table • JSON • CSV</text>
    <text x="880" y="297" fill="#94a3b8">--output-file artifacts</text>
  </g>

  <g transform="translate(860 143)">
    <rect x="0" y="0" width="200" height="44" rx="22" fill="#064e3b" opacity="0.72"/>
    <path d="M28 23 l10 10 l21 -24" fill="none" stroke="#bbf7d0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="70" y="29" fill="#dcfce7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">release-ready CLI</text>
  </g>

  <text x="106" y="373" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Built for boringly reliable infrastructure review: deterministic output, practical filters, cross-platform packaging.</text>
</svg>
