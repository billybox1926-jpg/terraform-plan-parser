<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Terraform Plan Parser CLI visual</title>
  <desc id="desc">A simple terminal-style banner with abstract command lines flowing into parsed output rows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" rx="30" fill="url(#bg)"/>
  <circle cx="1025" cy="75" r="145" fill="#38bdf8" opacity="0.08"/>
  <circle cx="170" cy="310" r="170" fill="#34d399" opacity="0.07"/>

  <rect x="86" y="58" width="1028" height="244" rx="22" fill="#020617" opacity="0.90"/>
  <rect x="86" y="58" width="1028" height="42" rx="22" fill="#111827"/>
  <circle cx="118" cy="79" r="7" fill="#fb7185"/>
  <circle cx="142" cy="79" r="7" fill="#fbbf24"/>
  <circle cx="166" cy="79" r="7" fill="#34d399"/>

  <rect x="130" y="132" width="24" height="24" rx="4" fill="#38bdf8" opacity="0.95"/>
  <rect x="174" y="132" width="260" height="13" rx="7" fill="#cbd5e1" opacity="0.76"/>
  <rect x="174" y="161" width="188" height="13" rx="7" fill="#64748b" opacity="0.70"/>
  <rect x="174" y="190" width="315" height="13" rx="7" fill="#64748b" opacity="0.42"/>

  <line x1="520" y1="168" x2="610" y2="168" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <polygon points="610,168 590,154 590,182" fill="#94a3b8"/>

  <rect x="650" y="118" width="150" height="100" rx="18" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
  <rect x="678" y="143" width="22" height="54" rx="8" fill="#a78bfa" opacity="0.78"/>
  <rect x="715" y="143" width="22" height="54" rx="8" fill="#38bdf8" opacity="0.78"/>
  <rect x="752" y="143" width="22" height="54" rx="8" fill="#34d399" opacity="0.78"/>

  <line x1="832" y1="168" x2="922" y2="168" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <polygon points="922,168 902,154 902,182" fill="#94a3b8"/>

  <rect x="952" y="124" width="112" height="12" rx="6" fill="#34d399" opacity="0.85"/>
  <rect x="952" y="154" width="150" height="12" rx="6" fill="#38bdf8" opacity="0.72"/>
  <rect x="952" y="184" width="128" height="12" rx="6" fill="#a78bfa" opacity="0.72"/>

  <rect x="130" y="258" width="934" height="4" rx="2" fill="url(#line)" opacity="0.88"/>
  <circle cx="130" cy="260" r="8" fill="#38bdf8"/>
  <circle cx="650" cy="260" r="8" fill="#a78bfa"/>
  <circle cx="1064" cy="260" r="8" fill="#34d399"/>
